<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alternance Cockpit</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        font: 14px system-ui, sans-serif;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 15px;
      }
      /* Masqués par défaut : popup.js révèle l'état pertinent après lecture du
         token, pour éviter un flash de l'écran de connexion si déjà connecté. */
      #loading,
      #logged-out,
      #logged-in,
      #extract-status,
      #offer-form {
        display: none;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #8884;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
      }
      input:focus {
        outline: 2px solid #2563eb;
        outline-offset: 0;
        border-color: transparent;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 8px;
        border: 1px solid #8886;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      button.secondary {
        background: transparent;
        color: inherit;
      }
      .hint {
        margin: -4px 0 10px;
        font-size: 12px;
        opacity: 0.7;
      }
      #message {
        margin: 8px 0 0;
        min-height: 18px;
        font-size: 13px;
      }
      #message.error {
        color: #d33;
      }
      #message.success {
        color: #2e7d32;
      }
    </style>
  </head>
  <body>
    <h1>Alternance Cockpit</h1>

    <p id="loading">Chargement…</p>

    <!-- État (a) : non connecté -->
    <form id="logged-out" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" />

      <label for="password">Mot de passe</label>
      <input id="password" type="password" autocomplete="current-password" />

      <button id="login-btn" type="submit">Se connecter</button>
    </form>

    <!-- État (b) : connecté -->
    <div id="logged-in">
      <p id="extract-status">Lecture de l'offre…</p>

      <!-- Formulaire de correction pré-rempli par l'extraction -->
      <form id="offer-form" novalidate>
        <p class="hint">Vérifiez et complétez avant d'ajouter.</p>

        <label for="f-title">Intitulé du poste *</label>
        <input id="f-title" type="text" />

        <label for="f-company">Entreprise *</label>
        <input id="f-company" type="text" />

        <label for="f-location">Lieu</label>
        <input id="f-location" type="text" />

        <label for="f-url">Lien de l'offre</label>
        <input id="f-url" type="url" />

        <button id="add-btn" type="submit">Ajouter au cockpit</button>
      </form>

      <button id="logout-btn" type="button" class="secondary">Déconnexion</button>
    </div>

    <p id="message"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
